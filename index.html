<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Timestamp Generator</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⌛</text></svg>" />
    <link
      href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;800&display=swap"
      rel="stylesheet"
    />
    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      :root {
        --bg: #0a0a0f;
        --surface: #13131a;
        --border: #2a2a3a;
        --accent: #7c5cfc;
        --accent2: #fc5c7c;
        --text: #e8e8f0;
        --muted: #606080;
        --mono: "Montserrat", sans-serif;
        --display: "Montserrat", sans-serif;
      }

      :root.light {
        --bg: #f4f3ff;
        --surface: #ffffff;
        --border: #ddd8fb;
        --accent: #6040e8;
        --accent2: #e8305a;
        --text: #1a1530;
        --muted: #8880aa;
      }

      html,
      body {
        height: 100%;
      }

      body {
        background: var(--bg);
        color: var(--text);
        font-family: var(--mono);
        height: 100vh;
        display: flex;
        flex-direction: column;
        overflow: hidden;
        transition: background 0.25s, color 0.25s;
      }

      /* ── Theme toggle ── */
      .theme-toggle {
        position: absolute;
        top: 1.2rem;
        right: 1.4rem;
        z-index: 10;
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 999px;
        padding: 0.3rem 0.75rem;
        font-family: var(--mono);
        font-size: 0.72rem;
        color: var(--muted);
        cursor: pointer;
        display: flex;
        align-items: center;
        gap: 0.4rem;
        transition: border-color 0.18s, color 0.18s, background 0.25s;
        letter-spacing: 0.04em;
      }

      .theme-toggle:hover { border-color: var(--accent); color: var(--accent); }

      .theme-toggle .icon { font-size: 0.9rem; line-height: 1; }

      body::before {
        content: "";
        position: fixed;
        inset: 0;
        background:
          radial-gradient(ellipse 60% 40% at 20% 20%, rgba(124,92,252,0.10) 0%, transparent 60%),
          radial-gradient(ellipse 50% 35% at 80% 80%, rgba(252,92,124,0.08) 0%, transparent 60%);
        pointer-events: none;
        z-index: 0;
        transition: opacity 0.3s;
      }

      /* ── TOP: fixed, never moves ── */
      .top-panel {
        flex-shrink: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 1.2rem;
        padding: 2.5rem 2rem 1.5rem;
        position: relative;
        z-index: 1;
      }

      h1 {
        font-family: var(--display);
        font-size: clamp(1.4rem, 4vw, 2rem);
        font-weight: 800;
        letter-spacing: -0.02em;
        color: var(--text);
        text-align: center;
      }

      h1 span {
        background: linear-gradient(90deg, var(--accent), var(--accent2));
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
      }

      #clock {
        font-size: 0.78rem;
        color: var(--muted);
        letter-spacing: 0.08em;
      }

      .btn-row {
        display: flex;
        gap: 0.75rem;
        flex-wrap: wrap;
        justify-content: center;
      }

      .btn {
        padding: 0.6rem 1.4rem;
        border: 1px solid var(--border);
        background: var(--surface);
        color: var(--text);
        font-family: var(--mono);
        font-size: 0.85rem;
        font-weight: 700;
        letter-spacing: 0.05em;
        border-radius: 6px;
        cursor: pointer;
        transition:
          border-color 0.18s,
          transform 0.12s;
        position: relative;
        overflow: hidden;
      }

      .btn::after {
        content: "";
        position: absolute;
        inset: 0;
        background: linear-gradient(135deg, var(--accent), var(--accent2));
        opacity: 0;
        transition: opacity 0.18s;
      }

      .btn:hover {
        border-color: var(--accent);
        transform: translateY(-2px);
      }
      .btn:hover::after {
        opacity: 0.1;
      }
      .btn:active {
        transform: translateY(0);
      }

      .btn.all {
        background: linear-gradient(90deg, var(--accent), var(--accent2));
        border-color: transparent;
        color: #fff;
      }
      .btn.all:hover::after {
        display: none;
      }

      /* divider */
      .divider {
        flex-shrink: 0;
        width: 100%;
        height: 1px;
        background: var(--border);
        position: relative;
        z-index: 1;
      }

      /* ── BOTTOM: scrollable list ── */
      .bottom-panel {
        flex: 1;
        overflow: hidden;
        display: flex;
        flex-direction: column;
        align-items: center;
        padding: 1.2rem 2rem 1rem;
        position: relative;
        z-index: 1;
      }

      .output-area {
        width: 100%;
        max-width: 560px;
        display: flex;
        flex-direction: column;
        gap: 0.6rem;
        flex: 1;
        overflow-y: auto;
        padding-right: 6px;
        scrollbar-width: thin;
        scrollbar-color: var(--border) transparent;
      }

      .output-area::-webkit-scrollbar {
        width: 4px;
      }
      .output-area::-webkit-scrollbar-thumb {
        background: var(--border);
        border-radius: 4px;
      }

      .result-item {
        display: flex;
        align-items: center;
        justify-content: space-between;
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 8px;
        padding: 0.85rem 1.1rem;
        gap: 1rem;
        animation: fadeIn 0.22s ease;
        transition: border-color 0.18s, background 0.25s;
        flex-shrink: 0;
      }

      .result-item:hover {
        border-color: var(--accent);
      }

      @keyframes fadeIn {
        from {
          opacity: 0;
          transform: translateY(6px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      .result-text {
        font-size: 0.9rem;
        letter-spacing: 0.03em;
        color: var(--text);
        flex: 1;
        word-break: break-all;
      }

      .result-text .prefix {
        color: var(--accent);
        font-weight: 700;
      }
      .result-text .sep { color: var(--muted); }
      .result-text .date {
        color: #a0a0c0;
      }
      .result-text .time {
        color: var(--accent2);
      }

      .copy-btn {
        background: none;
        border: 1px solid var(--border);
        color: var(--muted);
        font-family: var(--mono);
        font-size: 0.7rem;
        padding: 0.3rem 0.65rem;
        border-radius: 4px;
        cursor: pointer;
        transition: border-color 0.15s, color 0.15s;
        white-space: nowrap;
        flex-shrink: 0;
      }

      .copy-btn:hover {
        border-color: var(--accent);
        color: var(--accent);
      }
      .copy-btn.copied {
        border-color: #3ecf8e;
        color: #3ecf8e;
      }

      .empty {
        text-align: center;
        color: var(--muted);
        font-size: 0.8rem;
        padding: 2rem 0;
        opacity: 0.6;
      }

      /* ── Footer bar: clear + countdown ── */
      .footer {
        flex-shrink: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 1.2rem;
        padding: 0.75rem 2rem 1.2rem;
        position: relative;
        z-index: 1;
      }

      .clear-btn {
        font-size: 0.72rem;
        color: var(--muted);
        background: none;
        border: none;
        cursor: pointer;
        font-family: var(--mono);
        text-decoration: underline;
        transition: color 0.15s;
        opacity: 0.7;
      }
      .clear-btn:hover {
        color: var(--accent2);
        opacity: 1;
      }

      #countdown {
        font-size: 0.68rem;
        color: var(--muted);
        letter-spacing: 0.06em;
        min-width: 7ch;
        opacity: 0.7;
      }

      /* ── Custom input row ── */
      .custom-row {
        flex-shrink: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 0.5rem;
        padding: 1rem;
        position: relative;
        z-index: 1;
      }

      .custom-input {
        flex: 1;
        max-width: 340px;
        padding: 0.55rem 0.9rem;
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 6px;
        color: var(--text);
        font-family: var(--mono);
        font-size: 0.85rem;
        outline: none;
        transition: border-color 0.18s;
      }

      .custom-input::placeholder { color: var(--muted); opacity: 0.6; }
      .custom-input:focus { border-color: var(--accent); }

      .btn-custom {
        padding: 0.55rem 1.1rem;
        background: var(--surface);
        border: 1px solid var(--border);
        color: var(--text);
        font-family: var(--mono);
        font-size: 0.85rem;
        font-weight: 700;
        border-radius: 6px;
        cursor: pointer;
        white-space: nowrap;
        transition: border-color 0.18s, transform 0.12s;
        position: relative;
        overflow: hidden;
      }

      .btn-custom::after {
        content: "";
        position: absolute;
        inset: 0;
        background: linear-gradient(135deg, var(--accent), var(--accent2));
        opacity: 0;
        transition: opacity 0.18s;
      }

      .btn-custom:hover { border-color: var(--accent); transform: translateY(-2px); }
      .btn-custom:hover::after { opacity: 0.1; }
      .btn-custom:active { transform: translateY(0); }
    </style>
  </head>
  <body>
    <!-- TOP: fixed area -->
    <div class="top-panel">
      <button class="theme-toggle" id="themeToggle" onclick="toggleTheme()">
        <span class="icon">🌙</span><span id="themeLabel">Dark</span>
      </button>
      <h1>Timestamp <span>Generator</span></h1>
      <div id="clock">--:--:--</div>
      <div class="btn-row">
        <button class="btn" onclick="generate('Test')">Test</button>
        <button class="btn" onclick="generate('Help')">Help</button>
        <button class="btn" onclick="generate('Resolved')">Resolved</button>
        <button class="btn all" onclick="generateAll()">Generate All</button>
      </div>
    </div>

    <div class="divider"></div>

    <!-- Custom input -->
    <div class="custom-row">
      <input
        class="custom-input"
        id="customInput"
        type="text"
        placeholder="Nhập ký tự bất kỳ..."
        onkeydown="if(event.key==='Enter') generateCustom()"
      />
      <button class="btn-custom" onclick="generateCustom()">Gen</button>
    </div>

    <div class="divider"></div>
    <div class="bottom-panel">
      <div class="output-area" id="output">
        <div class="empty">Nhấn nút để tạo chuỗi ký tự</div>
      </div>
    </div>

    <!-- Footer -->
    <div class="footer">
      <button class="clear-btn" onclick="clearAll()">Xoá tất cả</button>
      <div id="countdown"></div>
    </div>

    <script>
      // Theme toggle
      let isLight = false;
      function toggleTheme() {
        isLight = !isLight;
        document.documentElement.classList.toggle('light', isLight);
        const btn = document.getElementById('themeToggle');
        const icon = btn.querySelector('.icon');
        const label = document.getElementById('themeLabel');
        icon.textContent = isLight ? '☀️' : '🌙';
        label.textContent = isLight ? 'Light' : 'Dark';
      }

      // Live clock
      function updateClock() {
        const now = new Date();
        const hh = String(now.getHours()).padStart(2, "0");
        const mm = String(now.getMinutes()).padStart(2, "0");
        const ss = String(now.getSeconds()).padStart(2, "0");
        document.getElementById("clock").textContent = `${hh}:${mm}:${ss}`;
      }
      setInterval(updateClock, 1000);
      updateClock();

      function getTimestamp() {
        const now = new Date();
        const dd = String(now.getDate()).padStart(2, "0");
        const mo = String(now.getMonth() + 1).padStart(2, "0");
        const yyyy = now.getFullYear();
        const hh = String(now.getHours()).padStart(2, "0");
        const mm = String(now.getMinutes()).padStart(2, "0");
        const ss = String(now.getSeconds()).padStart(2, "0");
        return { date: `${dd}-${mo}-${yyyy}`, time: `${hh}:${mm}:${ss}` };
      }

      function generateCustom() {
        const input = document.getElementById("customInput");
        const val = input.value.trim();
        if (!val) { input.focus(); return; }
        generate(val);
        input.value = "";
        input.focus();
      }

      function generate(prefix) {
        const { date, time } = getTimestamp();
        const str = `${prefix}_${date}_${time}`;
        addResult(prefix, date, time, str);
        resetAutoClear();
      }

      function generateAll() {
        ["Test", "Help", "Resolved"].forEach((p) => generate(p));
      }

      function addResult(prefix, date, time, full) {
        const output = document.getElementById("output");
        const empty = output.querySelector(".empty");
        if (empty) empty.remove();

        const item = document.createElement("div");
        item.className = "result-item";
        item.innerHTML = `
          <div class="result-text">
            <span class="prefix">${prefix}</span><span class="sep">_</span><span class="date">${date}</span><span class="sep">_</span><span class="time">${time}</span>
          </div>
          <button class="copy-btn" onclick="copyText(this, '${full}')">Copy</button>
        `;
        output.prepend(item);
      }

      // Auto-clear after 30s
      let autoClearTimer = null;
      let countdownInterval = null;
      const CLEAR_DELAY = 30 * 1000;

      function resetAutoClear() {
        clearTimeout(autoClearTimer);
        clearInterval(countdownInterval);

        let remaining = CLEAR_DELAY / 1000;
        updateCountdown(remaining);

        countdownInterval = setInterval(() => {
          remaining--;
          updateCountdown(remaining);
          if (remaining <= 0) clearInterval(countdownInterval);
        }, 1000);

        autoClearTimer = setTimeout(() => clearAll(true), CLEAR_DELAY);
      }

      function updateCountdown(sec) {
        const el = document.getElementById("countdown");
        if (!el) return;
        if (sec <= 0) {
          el.textContent = "";
          return;
        }
        const s = String(sec).padStart(2, "0");
        el.textContent = `Tự động xoá toàn bộ sau 00:${s}`;
      }

      function copyText(btn, text) {
        navigator.clipboard.writeText(text).then(() => {
          btn.textContent = "Copied!";
          btn.classList.add("copied");
          setTimeout(() => {
            btn.textContent = "Copy";
            btn.classList.remove("copied");
          }, 1500);
        });
      }

      function clearAll(auto = false) {
        clearTimeout(autoClearTimer);
        clearInterval(countdownInterval);
        const output = document.getElementById("output");
        output.innerHTML =
          '<div class="empty">Nhấn nút để tạo chuỗi ký tự</div>';
        updateCountdown(0);
      }
    </script>
  </body>
</html>
